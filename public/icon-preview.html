<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SprintHelm Icon Options</title>
  <style>
    body {
      background: #13151F;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      font-family: system-ui, sans-serif;
      color: #E2E4EF;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    h3 {
      margin: 0;
      font-size: 14px;
      color: #8B8FA8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .sizes {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .label {
      font-size: 11px;
      color: #555870;
      text-align: center;
      margin-top: 6px;
    }
    .size-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

<!-- ── HELM WHEEL ─────────────────────────────────────────────────────────── -->
<div class="card">
  <h3>Helm Wheel</h3>
  <div class="sizes">

    <!-- 512px -->
    <div class="size-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- outer ring -->
        <circle cx="60" cy="60" r="52" stroke="#5C6BC0" stroke-width="8" fill="none"/>
        <!-- inner hub -->
        <circle cx="60" cy="60" r="10" fill="#5C6BC0"/>
        <!-- spokes (8) -->
        <line x1="60" y1="50" x2="60" y2="14" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="60" y1="70" x2="60" y2="106" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="50" y1="60" x2="14" y2="60" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="70" y1="60" x2="106" y2="60" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="53" y1="53" x2="27" y2="27" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="67" y1="67" x2="93" y2="93" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="67" y1="53" x2="93" y2="27" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="53" y1="67" x2="27" y2="93" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <!-- handle knobs on rim -->
        <circle cx="60" cy="8" r="5" fill="#5C6BC0"/>
        <circle cx="60" cy="112" r="5" fill="#5C6BC0"/>
        <circle cx="8" cy="60" r="5" fill="#5C6BC0"/>
        <circle cx="112" cy="60" r="5" fill="#5C6BC0"/>
        <circle cx="22.7" cy="22.7" r="5" fill="#5C6BC0"/>
        <circle cx="97.3" cy="97.3" r="5" fill="#5C6BC0"/>
        <circle cx="97.3" cy="22.7" r="5" fill="#5C6BC0"/>
        <circle cx="22.7" cy="97.3" r="5" fill="#5C6BC0"/>
      </svg>
      <div class="label">Full size</div>
    </div>

    <!-- 48px simulation -->
    <div class="size-wrap">
      <svg width="48" height="48" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="52" stroke="#5C6BC0" stroke-width="8" fill="none"/>
        <circle cx="60" cy="60" r="10" fill="#5C6BC0"/>
        <line x1="60" y1="50" x2="60" y2="14" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="60" y1="70" x2="60" y2="106" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="50" y1="60" x2="14" y2="60" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="70" y1="60" x2="106" y2="60" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="53" y1="53" x2="27" y2="27" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="67" y1="67" x2="93" y2="93" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="67" y1="53" x2="93" y2="27" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="53" y1="67" x2="27" y2="93" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <circle cx="60" cy="8" r="5" fill="#5C6BC0"/>
        <circle cx="60" cy="112" r="5" fill="#5C6BC0"/>
        <circle cx="8" cy="60" r="5" fill="#5C6BC0"/>
        <circle cx="112" cy="60" r="5" fill="#5C6BC0"/>
        <circle cx="22.7" cy="22.7" r="5" fill="#5C6BC0"/>
        <circle cx="97.3" cy="97.3" r="5" fill="#5C6BC0"/>
        <circle cx="97.3" cy="22.7" r="5" fill="#5C6BC0"/>
        <circle cx="22.7" cy="97.3" r="5" fill="#5C6BC0"/>
      </svg>
      <div class="label">48px</div>
    </div>

    <!-- 16px favicon -->
    <div class="size-wrap">
      <svg width="16" height="16" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="52" stroke="#5C6BC0" stroke-width="8" fill="none"/>
        <circle cx="60" cy="60" r="10" fill="#5C6BC0"/>
        <line x1="60" y1="50" x2="60" y2="14" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="60" y1="70" x2="60" y2="106" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="50" y1="60" x2="14" y2="60" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="70" y1="60" x2="106" y2="60" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="53" y1="53" x2="27" y2="27" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="67" y1="67" x2="93" y2="93" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="67" y1="53" x2="93" y2="27" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <line x1="53" y1="67" x2="27" y2="93" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
        <circle cx="60" cy="8" r="5" fill="#5C6BC0"/>
        <circle cx="60" cy="112" r="5" fill="#5C6BC0"/>
        <circle cx="8" cy="60" r="5" fill="#5C6BC0"/>
        <circle cx="112" cy="60" r="5" fill="#5C6BC0"/>
        <circle cx="22.7" cy="22.7" r="5" fill="#5C6BC0"/>
        <circle cx="97.3" cy="97.3" r="5" fill="#5C6BC0"/>
        <circle cx="97.3" cy="22.7" r="5" fill="#5C6BC0"/>
        <circle cx="22.7" cy="97.3" r="5" fill="#5C6BC0"/>
      </svg>
      <div class="label">16px (favicon)</div>
    </div>

  </div>
</div>

<!-- ── PRESSURE DIAL ───────────────────────────────────────────────────────── -->
<div class="card">
  <h3>Pressure Dial</h3>
  <div class="sizes">

    <!-- Full size -->
    <div class="size-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- background circle -->
        <circle cx="60" cy="60" r="54" fill="#1E2130"/>
        <!-- arc track (green → amber → red), semicircle bottom-open -->
        <!-- green zone -->
        <path d="M 14 70 A 46 46 0 0 1 37 24" stroke="#66BB6A" stroke-width="10" stroke-linecap="round" fill="none"/>
        <!-- amber zone -->
        <path d="M 37 24 A 46 46 0 0 1 83 24" stroke="#FFA726" stroke-width="10" stroke-linecap="round" fill="none"/>
        <!-- red zone -->
        <path d="M 83 24 A 46 46 0 0 1 106 70" stroke="#EF5350" stroke-width="10" stroke-linecap="round" fill="none"/>
        <!-- needle pointing to amber zone (~1 o'clock) -->
        <line x1="60" y1="60" x2="88" y2="28" stroke="#E2E4EF" stroke-width="4" stroke-linecap="round"/>
        <!-- hub -->
        <circle cx="60" cy="60" r="7" fill="#5C6BC0"/>
        <circle cx="60" cy="60" r="3" fill="#E2E4EF"/>
        <!-- label -->
        <text x="60" y="90" text-anchor="middle" font-size="11" fill="#8B8FA8" font-family="system-ui">PRESSURE</text>
      </svg>
      <div class="label">Full size</div>
    </div>

    <!-- 48px -->
    <div class="size-wrap">
      <svg width="48" height="48" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="54" fill="#1E2130"/>
        <path d="M 14 70 A 46 46 0 0 1 37 24" stroke="#66BB6A" stroke-width="10" stroke-linecap="round" fill="none"/>
        <path d="M 37 24 A 46 46 0 0 1 83 24" stroke="#FFA726" stroke-width="10" stroke-linecap="round" fill="none"/>
        <path d="M 83 24 A 46 46 0 0 1 106 70" stroke="#EF5350" stroke-width="10" stroke-linecap="round" fill="none"/>
        <line x1="60" y1="60" x2="88" y2="28" stroke="#E2E4EF" stroke-width="4" stroke-linecap="round"/>
        <circle cx="60" cy="60" r="7" fill="#5C6BC0"/>
        <circle cx="60" cy="60" r="3" fill="#E2E4EF"/>
      </svg>
      <div class="label">48px</div>
    </div>

    <!-- 16px favicon -->
    <div class="size-wrap">
      <svg width="16" height="16" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="54" fill="#1E2130"/>
        <path d="M 14 70 A 46 46 0 0 1 37 24" stroke="#66BB6A" stroke-width="10" stroke-linecap="round" fill="none"/>
        <path d="M 37 24 A 46 46 0 0 1 83 24" stroke="#FFA726" stroke-width="10" stroke-linecap="round" fill="none"/>
        <path d="M 83 24 A 46 46 0 0 1 106 70" stroke="#EF5350" stroke-width="10" stroke-linecap="round" fill="none"/>
        <line x1="60" y1="60" x2="88" y2="28" stroke="#E2E4EF" stroke-width="4" stroke-linecap="round"/>
        <circle cx="60" cy="60" r="7" fill="#5C6BC0"/>
        <circle cx="60" cy="60" r="3" fill="#E2E4EF"/>
      </svg>
      <div class="label">16px (favicon)</div>
    </div>

  </div>
</div>

</body>
</html>

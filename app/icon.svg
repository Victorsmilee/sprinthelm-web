<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#13151F"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" stroke="#1E2338" stroke-width="4" fill="none"/>

  <!-- Arc track: green zone (left ~210° to 270°) -->
  <path d="M 68 310 A 196 196 0 0 1 134 96" stroke="#66BB6A" stroke-width="44" stroke-linecap="round" fill="none"/>

  <!-- Arc track: amber zone (270° to 330°, top centre) -->
  <path d="M 134 96 A 196 196 0 0 1 378 96" stroke="#FFA726" stroke-width="44" stroke-linecap="round" fill="none"/>

  <!-- Arc track: red zone (330° to 390°, right) -->
  <path d="M 378 96 A 196 196 0 0 1 444 310" stroke="#EF5350" stroke-width="44" stroke-linecap="round" fill="none"/>

  <!-- Inner arc track background (subtle) -->
  <path d="M 68 310 A 196 196 0 0 1 444 310" stroke="#1E2338" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Needle pointing to amber (roughly 11 o'clock — warning territory) -->
  <line x1="256" y1="256" x2="148" y2="108" stroke="#E2E4EF" stroke-width="18" stroke-linecap="round"/>

  <!-- Needle shadow/glow -->
  <line x1="256" y1="256" x2="148" y2="108" stroke="#5C6BC0" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Hub outer -->
  <circle cx="256" cy="256" r="36" fill="#5C6BC0"/>
  <!-- Hub inner -->
  <circle cx="256" cy="256" r="16" fill="#E2E4EF"/>

  <!-- Tick marks -->
  <line x1="68" y1="310" x2="82" y2="298" stroke="#8B8FA8" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="60" x2="256" y2="76" stroke="#8B8FA8" stroke-width="6" stroke-linecap="round"/>
  <line x1="444" y1="310" x2="430" y2="298" stroke="#8B8FA8" stroke-width="6" stroke-linecap="round"/>
</svg>
